name: Keep App Alive

on:
  workflow_dispatch: # 允许手动触发

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 更新 README 并触发重部署
        run: |
          # 1. 先拉取一下可能存在的远程更新，防止冲突
          git pull origin main || git pull origin master || echo "拉取失败或为新仓库"
          
          # 2. 获取当前时间戳（北京时间）
          TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          echo "开始保活流程 - $TIMESTAMP"
          
          # 3. 直接覆写 README.md 
          cat > README.md << EOF
          # App 保活状态监控

          **最后唤醒时间**: \`$TIMESTAMP\`

          **运行结果**: <br>
          ✅ 保活脚本执行成功，已触发重新部署。
          EOF
          
          # 4. 提交并推送
          git add README.md
          git commit -m "🔄 自动保活: $TIMESTAMP"
          
          # 加入 --rebase 增加推送的健壮性
          git pull --rebase || true
          git push
          
          echo "🎉 README已更新，推送完成！"

      - name: Delete old workflow runs
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          older-than-seconds: 10800  # 保留 3 小时内的记录
